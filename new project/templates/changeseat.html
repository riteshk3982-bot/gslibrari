<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Seat</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="card">

<h2>🪑 Change Student Seat</h2>

<form method="POST">

<p><b>Name :</b> {{ student.name }}</p>

<p><b>Current Seat :</b> {{ student.seat }}</p>

<label>New Seat</label>

<br><br>

<input type="text"
       name="seat"
       value="{{ student.seat }}"
       required>

<br><br>

<button type="submit">

Update Seat

</button>

</form>

<br>

<a class="btn" href="/students">

⬅ Back

</a>

</div>

</body>

</html>
